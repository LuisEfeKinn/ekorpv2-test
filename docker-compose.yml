services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Increase V8 heap during `next build` (avoids build OOM in Docker/CI).
        BUILD_NODE_OPTIONS: --max-old-space-size=4096
        NEXT_PUBLIC_AWS_AMPLIFY_IDENTITY_POOL_ID: ${NEXT_PUBLIC_AWS_AMPLIFY_IDENTITY_POOL_ID}
        NEXT_PUBLIC_AWS_AMPLIFY_USER_POOL_CLIENT_ID: ${NEXT_PUBLIC_AWS_AMPLIFY_USER_POOL_CLIENT_ID}
        NEXT_PUBLIC_AWS_AMPLIFY_USER_POOL_ID: ${NEXT_PUBLIC_AWS_AMPLIFY_USER_POOL_ID}
        NEXT_PUBLIC_AWS_REGION: ${NEXT_PUBLIC_AWS_REGION}
        NEXT_PUBLIC_HOST_API: ${NEXT_PUBLIC_HOST_API}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
        NEXT_PUBLIC_WIDGET_BASE_URL: ${NEXT_PUBLIC_WIDGET_BASE_URL}
    image: ekorp-front-v2:latest
    container_name: ekorp-front-v2
    restart: unless-stopped
    init: true
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8082
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/liveness-check >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8082 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
