services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ekorp-front-v2:latest
    container_name: ekorp-front-v2
    restart: unless-stopped
    init: true
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 8082
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8082/liveness-check >/dev/null 2>&1 || curl -fsS http://127.0.0.1:8082 >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
